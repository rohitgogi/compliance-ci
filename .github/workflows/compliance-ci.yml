name: compliance-ci

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e ".[dev]"

      - name: Run compliance evaluation
        id: evaluate
        env:
          COMPLIANCE_BACKEND_URL: ${{ secrets.COMPLIANCE_BACKEND_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          RESPONSE=$(python backend/scripts/run_ci_check.py | tail -n1)
          EXIT_CODE=$?
          set -e
          {
            echo "response<<EOF"
            echo "$RESPONSE"
            echo "EOF"
            echo "exit_code=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"
          echo "$RESPONSE"

      - name: Upsert PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          EVAL_RESPONSE: ${{ steps.evaluate.outputs.response }}
        with:
          script: |
            const marker = "<!-- compliance-ci-comment -->";
            const parsed = JSON.parse(process.env.EVAL_RESPONSE || "{}");
            const body = parsed.comment_markdown || `${marker}\nNo compliance specs changed.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find((c) => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce compliance gate
        if: always()
        run: |
          test "${{ steps.evaluate.outputs.exit_code }}" = "0"
